  /pickups:
    post:
      security:
        - JWT: []
      tags:
        - Pickups
      description: |
        This method allows business clients to create a new courier pickup request by specifying essential parameters such as the pickup address, parcel type, and additional details. 

        **Initial Status (`Draft`)**: The pickup request is created in the `Draft` status, which allows clients to add all necessary shipments to the request. 
        
        **Transition to `Created`**: Once all shipments are added, clients must use the "Update pickup request status" method to change the status to `Created`. This indicates that the pickup is finalized and ready for processing by the courier service.
        
        **Time Intervals**: To include a specific time interval for the pickup, clients should retrieve available time intervals using the corresponding method. This ensures that the requested pickup time aligns with the courier's schedule and availability.

        This method is available to business clients in EU countries where Nova Post operates.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  description: Optional notes or instructions for the courier.
                  maxLength: 255
                services:
                  type: array
                  items:
                    type: string
                  description: List of additional services that can be included in the pickup request. This functionality is currently under development.
                  nullable: true
                phone:
                  type: string
                  description: The contact phone number of the sender, required to allow the courier to reach out if necessary.
                  minLength: 8
                  maxLength: 14
                email:
                  type: string
                  description: While not mandatory, providing an email is recommended as a backup contact method in case the phone number is incorrect or for additional notifications regarding the pickup.
                  nullable: true
                fullName:
                  type: string
                  description: Full name of the client sending the parcel, essential for identifying the sender and ensuring accurate handling of the pickup.
                  maxLength: 100
                companyTin:
                  type: string
                  description: The contract number of the requesting company.
                  minLength: 2
                  maxLength: 20
                companyName:
                  type: string
                  description: Name of the company requesting the pickup.
                  minLength: 2
                  maxLength: 255
                countryCode:
                  type: string
                  description: ISO Alpha-2 code for the pickup location.
                  pattern: "^[A-Z]{2}$"
                addressParts:
                  type: object
                  description: Detailed address information for the pickup location.
                  properties:
                    city:
                      type: string
                      description: The name of the city for the pickup location.
                      maxLength: 100
                    region:
                      type: string
                      description: The administrative area, state, or region for the pickup.
                      maxLength: 100
                    street:
                      type: string
                      description: The street name for the pickup location.
                      maxLength: 100
                    postCode:
                      type: string
                      description: The postal code of the pickup location.
                      maxLength: 10
                    building:
                      type: string
                      description: The building number or name at the pickup address.
                      maxLength: 100
                    flat:
                      type: string
                      description: The apartment or office number within the building.
                      maxLength: 10
                    block:
                      type: string
                      description: The specific block or section within a larger complex, if applicable.
                      maxLength: 100
                    note:
                      type: string
                      description: Additional instructions for the courier to access the pickup location.
                      maxLength: 100
                pickedTimeFrom:
                  type: string
                  format: date-time
                  description: Start of the pickup time window, selected from available time intervals provided by the method that returns available time slots. If no time slot is specified, the courier will schedule the pickup at their discretion.
                  pattern: "^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$"
                  nullable: true
                pickedTimeTo:
                  type: string
                  format: date-time
                  description: End of the pickup time window, selected from available time intervals provided by the method that returns available time slots. If no time slot is specified, the courier will schedule the pickup at their discretion.
                  pattern: "^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$"
                  nullable: true
