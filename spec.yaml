components:
  securitySchemes:
    JWT:
      type: apiKey
      in: header
      name: Authorization
      description: Authorization JWT-token with a lifetime of 1 hour in header
    ApiKeyAuth:
      type: apiKey
      in: query
      name: apiKey
      description: API access key to generate an JWT-token in query
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Validation:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Time-out:
      description: Connection time-out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        errors:
          type: object
          properties:
            '':
              type: string
    TestApiKeyResponse:
      type: object
      additionalProperties: false
      required: [apiKey, createdAt, expDate, status]
      properties:
        apiKey:
          type: string
          description: Test API key for Stage usage only.
          example: "99dde7bdce11414efc2f1c10ddbfd42da8ce4bf2"
        createdAt:
          type: string
          format: date-time
          example: "2025-08-27T08:03:02.000000Z"
        expDate:
          type: string
          format: date-time
          example: "2026-08-29T23:59:59.000Z"
        status:
          type: string
          enum: [Active, Expired]
          example: "Active"

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [success, errors]
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items: { type: string }
          example: ["Invalid phone format"]