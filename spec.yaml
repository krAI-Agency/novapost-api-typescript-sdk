    delete:
      security:
        - JWT: []
      tags:
        - Shipments
      description: |
        This method allows you to delete a shipment document based on its unique identifier (ID). 
        To successfully remove the document from the system, the request must include its ID. 
        The response will indicate the success of the operation.

        **Implementation Details for Different Regions:**

        **1. Europe:**
        - The method primarily expects a unique ID (Ref ID) of the document.
        - Additionally, deletion using the shipment number (e.g., `SHPL0123456789`) is also supported.

        **2. Ukraine:**
        - Deletion is supported only by Ref ID (unique identifier of the document).
        - Deletion using the shipment number (e.g., waybill number) is not supported.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - name: id
          in: path
          description: Transportation (shipment) document id.
          required: true
          schema:
              type: string
          examples:
              international:
                summary: International shipment
                value: 456931
              local:
                summary: Local shipment (Ukraine)
                value: e2cf6e8c-b3bb-11ef-bcd0-48df37b921da
      responses:
        '200':
          description: shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedAt:
                    type: string
                    description: Datetime when the document was deleted.
              example: '{ "deletedAt": "2023-04-18T11:47:19.290462Z" } '
