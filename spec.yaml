  /registry:
    post:
      tags:
      - Registers
      summary: Create a shipment registry
      description: |
       The method is used to create a shipment register that combines
        multiple shipments into a single document.
        
        **Limitations for working with registers:**
        1. This method is available for shipments from Ukraine to the World. 
        2. Creating registers is available only for shipments originating from Ukraine. 
        3. A shipment can be added to a register only if the Sender’s data (city, counterparty, address) are identical for all shipments being added.
        4. A shipment can be added only to one register — the same document cannot be added to multiple registers simultaneously. 
        5. A shipment cannot be added to a register if a printed form has already been generated for this document and the shipment date (printing date) is earlier than yesterday relative to the register creation date.
        6. A shipment can be added to a register only until an express waybill has been created based on it (or until the shipment has been scanned at a Nova Poshta branch/unit). 
        7. A shipment marked for deletion cannot be added to a register.
        8. After the register’s printed form has been generated, adding shipments to it is blocked.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - description
              - shipments
              properties:
                description:
                  type: string
                  description: Register name
                shipments:
                  type: array
                  description: Array of unique shipment identifiers.
                  uniqueItems: true
                  minItems: 1
                  items:
                    type: object
                    properties:
                      shipmentId:
                        type: string
                        description: Unique shipment identifier.
              description: Object
            example:
              description: Test
              shipments:
              - 42cd5e04-986d-11f0-903f-005056bd9e02
              - 5bd6a533-986d-11f0-903f-005056bd9e02
      responses:
        '200':
          description: Registry created
          content:
            application/json:
              schema:
                type: object
