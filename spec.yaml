  /dictionary/classifier:
    get:
      security:
        - JWT: []
      tags:
        - Dictionaries
      description: |
        This API method allows you to retrieve a list of cargo classifiers (UKT ZED). Cargo classifiers are predefined categories or classifications used to categorize different types of cargo. By making a request to this method, you can obtain a list of cargo classifiers supported by the system. The response will include details of each classifier, such as the classifier ID, name, description, category, examples and any other relevant information. This data can be useful to generate a transportation document (shipment).
                **How it works:**
        - The method returns classifiers for the recipient country specified in the `country-code` parameter.
        - The format of UKT ZED codes depends on the selected country, example:
          - For destination countries **Canada (CA)** and **Moldova (MD)**, UKT ZED codes are strictly validated to be exactly **10 digits**.
          - Any non-numeric characters included in the `HsCode` will be automatically removed before validation.
        - The `keyword` parameter enables searching for a specific product classifier.
        - If `fuzzy=true`, the search will include similar results based on approximate matching.
        **Limitations:**
        - Some countries may not support UKT ZED retrieval via API.
        - Results depend on the latest classifier database updates.</br>

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - in: query
          name: country-code
          description:  |
            The ISO 3166-1 Alpha-2 code of the country for which the UKT ZED classifier is needed.
            This parameter refers to the **recipient country**, not the sender.
            The format of UKT ZED codes varies by country, example:
            - `UA` – Returns 8-digit codes.
            - `CA` or `MD` – Returns 10-digit codes.            
            **Example:** If you need UKT ZED codes for Canada, use `country-code=CA`.
          schema:
            type: string
            example: CA
        - in: query
          name: fuzzy
          description: Search mechanism enables to include results that closely resemble the query terms or have some degree of similarity, expanding the search scope to include variations or similar entries.
          schema:
            type: boolean
            enum:
              - true
              - false
            example: true
        - in: query
          name: keyword
          description: Search keyword for the classifier.
          schema:
            type: string
            example: book
        - in: query
          name: locale
          description: Language code according to ISO 639-1 standard.
          schema:
            type: string
            example: uk
        - in: query
          name: size
          description: Number of matching classifiers to return.
          schema:
            type: integer
            format: int32
            example: 15
      responses:
        '200':
          description: List of cargo classifiers (UKT ZED)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  source:
                    type: string
                  error:
                    type: string
                  items:
                    type: array
                    description: List of classifiers that correspond to the requested keyword. Returns null if there is no match.
                    nullable: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Classifier ID. 
                        hsCode:
                          type: string
                          description: Code of Сargo classifiers (UKT ZED) dictionary.
                        category:
                          type: object
                          description: Classifier`s category.
                          properties:
                            en:
                              type: string
                              description: Name of the category in English.
                            currentLocal:
                              type: string
                              description: Name of the category in the language according to the parameter - locale.
                          required:
                            - en
                            - currentLocal
                        subCategory:
                          type: object
                          description: Classifier`s subcategory.
                          properties:
                            en:
                              type: string
                              description: Name of the subcategory in English.
                            currentLocal:
                              type: string
                              description: Name of the subcategory in the language according to the parameter - locale.
                          required:
