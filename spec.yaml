  /shipments/light-return:
    post:
      security:
        - JWT: []
      tags:
        - Shipments
      summary: Create Light Return Shipment
      description: |
        Creates a return shipment after the original order has been delivered.
        This method allows customers to create a return shipment after delivery — regardless of who handled the last mile (Nova Post or a partner).
        
        ℹ️ **Information:** </br>
        The return can be created only if the parent shipment has the **Delivered** status and includes the **AllowedLightReturn** service. </br>
        The current status of a shipment can be found in the `"items" → "statusCode"` field of the [Find documents](https://api.novapost.com/developers/index.html#get-/shipments) method.</br>
        **AllowedLightReturn** defines the number of days within which the recipient can initiate a return after the delivery.
        Internally, the system verifies several conditions before allowing a Light Return shipment to be created:

        - The parent shipment status must be one of: `Issued (9, 10, 11, 106)`.
        - The system calculates the allowed return period using the following logic: </br>
          `finalDate = toTZ(parentShipment.RecipientDateTime) + returnDays + 1 day`</br>
          where returnDays is taken from the AllowedLightReturn service, and toTZ applies the relevant system time zone (e.g., EU region).
        - The return can be created only if the current time (nowTZ) is earlier than finalDate.
        - The system also checks that no Light Return has already been created for the same parent shipment.
        
        If all these conditions are met, the return creation request is accepted; otherwise, the system responds with a validation error indicating why the return is not permitted.

        **How the Light Return Shipment works**
        - The request must include one **required parameter** — `number` (the parent shipment number). **All other parameters are optional**.
        - The customer may specify a valid branch or address directly for the return.
        - If **optional parameters** are not specified, their values are automatically inherited from the parent shipment.
        - If the parent delivery was to a Postomat, the system automatically locates the nearest available branch in the same city based on the Postomat’s coordinates. </br>
        This branch is suggested for processing the return shipment, but the customer may physically send the parcel from any other convenient branch of their choice.
        - If parent delivery was to an address, a pickup is created automatically. </br>A pickup request is created only if the return wasn’t sent from a branch. 

        When the return is created, the system automatically generates a return waybill.
        For more information on creating a parent shipment, see [Create documents](https://api.novapost.com/developers/index.html#post-/shipments)</br>

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
              properties:
                number:
                  type: string
                  description: |
                    The number of the **parent shipment** for which the return is initiated.  
                    This parameter is mandatory to create a return.
                  example: "SHMD0000000000"
                divisionId:
                  type: string
                  description: |
                    Identifier of the division that will process the return.   
                  example: "1835903"
                senderPhone:
                  type: string
                  description: |
                    Phone number of the sender for the return shipment.  
                  example: "490000000000"
                addressParts:
                  type: object
                  description: |
                    Structure describing the address for pickup or delivery.  
                  properties:
                    city:
                      type: string
                      description: City name of the pickup or delivery address.
                    region:
                      type: string
                      description: Region or administrative area of the address.
                    street:
                      type: string
                      description: Street name of the address used for pickup or delivery.
                    postCode:
                      type: string
                      description: Postal code of the address used for pickup or delivery.
                    building:
                      type: string
                      description: Building number of the address used for pickup or delivery.
                    flat:
                      type: string
                      description: Apartment or office number at the specified address.
                    block:
                      type: string
                      description: Block or section information for the address, if applicable.
                    note:
                      type: string
                      description: Additional details or notes for the address (e.g., entrance, floor, or delivery comment).
                invoice:
                  type: object
                  description: |
                    This object presents the necessary data for customs authorities to process the consignment efficiently, including the assessment of duties and taxes, and to confirm adherence to import/export regulations. The structured format of the invoice ensures that all pertinent information is easily accessible and clear, facilitating a smoother transit across borders.
                  properties:
                    customerNumber:
                      type: string
                      description: Unique invoice identifier provided by the client, corresponding to the goods being shipped.
                      maxLength: 50
                      nullable: true
                    incoterm:
                      type: string
                      description: Specifies the trade terms based on Incoterms® (e.g., DAP). Required for cross-border shipments.
                      enum:
                        - DAP
                    currencyCode:
                      type: string
                      description: Currency code according to ISO-4217. Usually EUR or USD for international shipments.
                      pattern: "^[A-Z]{3}$"
                    exportReason:
                      type: string
                      description: Reason for export (ForPersonalPurposes, Selling, Repair, Return, Other).
                      enum:
                        - ForPersonalPurposes
                        - Selling
                        - Repair
                        - Return
                        - Other
                    totalCost:
                      type: number
                      description: Total declared value of the shipment in sender’s local currency.
                      minimum: 1
                      maximum: 9999999.99
                    totalCostEur:
                      type: number
                      description: Total declared value converted to EUR.
                      minimum: 1
                      maximum: 9999999.99
                    totalCostUsd:
                      type: number
                      description: Total declared value converted to USD.
                      minimum: 1
                      maximum: 9999999.99
                    items:
                      type: array
                      description: Detailed list of goods being shipped, required for customs declaration.
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            description: Unique identifier for each item within the shipment.
                          packingType:
                            type: string
                            enum:
                              - PA
                              - PX
                            description: Type of packing used (PA — box, PX — pallet).
                          hsCode:
                            type: string
                            description: Harmonized System code for each item (8–10 digits).
                          name:
                            type: string
                            description: Item name in the local language.
                          nameEng:
                            type: string
                            description: Item name in English.
                          material:
                            type: string
                            description: Primary material of the item.
                          madeInCountryCode:
                            type: string
                            description: Country of manufacture, ISO-3166 alpha-2.
                          actualWeight:
                            type: integer
                            description: Weight of the item in grams.
                          measurementCode:
                            type: string
                            description: Unit of measurement (e.g., pcs, kg, m).
                          amount:
                            type: number
                            description: Quantity of the item.
                          cost:
                            type: number
                            description: Value of the item in sender’s currency.
                          costUsd:
                            type: number
                            description: Value of the item in USD.
                          costEur:
                            type: number
                            description: Value of the item in EUR.
                parcels:
                  type: array
                  description: |
                    `Parcels` description block.  
                    Each object contains information about one parcel in the shipment.
                  items:
                    type: object
                    properties:
                      cargoCategory:
                        type: string
                        enum:
                          - parcel
                          - documents
                        description: Type of shipment (parcel or documents).
                      parcelDescription:
                        type: string
                        description: Short description of parcel contents.
                      insuranceCost:
                        type: number
                        format: float
                        description: Declared insurance value of the parcel.
                        example: 1.50
                      rowNumber:
                        type: integer
                        description: Sequential identifier for each parcel in the shipment.
                      width:
                        type: integer
                        description: Parcel width in millimeters.
                      length:
                        type: integer
                        description: Parcel length in millimeters.
                      height:
                        type: integer
                        description: Parcel height in millimeters.
                      actualWeight:
                        type: integer
                        description: Actual weight of the parcel in grams.
            examples:
              "Direction: EU–EU (full return — only 'number')":
                description: Full return example of a Light Return request where only the `number` parameter is provided for the EU–EU direction.
                value:
                  number: "SHMD0000000000"
                  senderPhone: "490000000000"

              "Direction: EU–EU (full return — with 'divisionId')":
                description: Full return example of a Light Return request with `number` and `divisionId` parameters for the EU–EU direction (return from division).
                value:
                  number: "SHMD0000000000"
                  senderPhone: "490000000000"
                  divisionId: "1000001"

              "Direction: EU–EU (full return — with 'addressParts')":
                description: Full return example of a Light Return request with `number` and `addressParts` parameters for the EU–EU direction (return from address).
                value:
                  number: "SHMD0000000000"
                  senderPhone: "490000000000"
                  addressParts:
                    city: "Warszawa"
                    region: "Mazowieckie"
                    street: "Default Street"
                    postCode: "00-000"
                    building: "1"
                    flat: "1"
                    block: "A"
                    note: "Default note"

              "Direction: EU–EU (partial return)":
                description: Partial return example of a Light Return request that includes `addressParts`, `invoice`, and `parcels`, without `divisionId`, for the EU–EU direction.
                value:
                  number: "SHMD0000000000"
