        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: >
                    Type of time interval. Allowed values are `PickupDayToDay` or `PickupNextDay`.
                  enum:
                    - PickupDayToDay
                    - PickupNextDay
                countryCode:
                  type: string
                  description: >
                    Country code according to the ISO 3166-1 Alpha-2 standard.
                  pattern: "^[A-Z]{2}$"
