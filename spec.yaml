                            - `InRouteDuplicate` — Shipment in transit — temporary partner-side delay
                            - `InRouteDuplicatePassed` — Temporary partner-side delay resolved
                            - `DepartureDuplicatePassed` — Shipment was in dispatch process from partner warehouse
                            - `ArrivalDuplicatePassed` — Shipment was pending processing at partner warehouse
                            - `ArrivalCustomTerminal` — Arrived at customs terminal
                            - `SentForCustomsClearance` — Sent for customs clearance
                            - `CustomClearanceIsCompleted` — Customs processing completed
                            - `SentToDestinationCountry` — Sent to destination city after customs
                            - `ArrivalRecipientPostomat` — Arrived at recipient’s parcel locker
                            - `LoadingCourierForMoving` — Courier picked up the shipment
                            - `CanceledSender` — Shipment cancelled by sender
                            - `PickUpCreated` — Pickup order created
                            - `PickUpAppointedCourier` — Courier assigned
                            - `PickUpInProgress` — Courier en route for pickup
                            - `PickUpDone` — Shipment picked up by courier
                            - `PickUpNotCompleted` — Pickup not completed by courier
                            - `PickUpReceivedByCourier` — Shipment received by courier
                            - `PickUpNotPacked` — Pickup not completed — shipment was not packed
                            - `CustomsRefusal` — Import prohibited by customs
                            - `DeclarationAddedToManifest` — Added to the manifest
                            - `DeclarationCustomerNoResponse` — Awaiting information from the recipient
                            - `DeclarationPackagingDamaged` — Packaging damaged
                            - `DeclarationShipmentDamaged` — Shipment damaged
                            - `DeclarationInvalidCustomerData` — Verifying declaration data
                            - `DeclarationNoSupportingDocuments` — Supporting documents missing
                            - `DeclarationAwaitingCustomsRelease` — Processing customs documents
                            - `DeclarationCustomsDocumentsReceived` — Customs documents received, clearance in progress
                            - `DeclarationShipmentAudit` — Cargo inspection by customs
                            - `DeclarationRequireCustomsClearance` — Customs clearance required
