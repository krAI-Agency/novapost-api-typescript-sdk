  /pickups/{id}:
    put:
      description: |
        The method is used to update the details of an already created pickup request. It allows clients to modify information such as the pickup address, contact details, time window and other to ensure accurate and timely parcel collection. 
        This method is available to business clients in EU countries where Nova Post operates.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      security:
        - JWT: []
      tags:
        - Pickups
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Unique identifier of the pickup request to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  description: Optional notes or instructions for the courier.
                  maxLength: 255
                services:
                  type: array
                  items:
                    type: string
                  description: List of additional services that can be included in the pickup request. This functionality is currently under development.
                  nullable: true
                phone:
                  type: string
                  description: The contact phone number of the sender, required to allow the courier to reach out if necessary.
                  minLength: 8
                  maxLength: 14
                email:
                  type: string
                  description: While not mandatory, providing an email is recommended as a backup contact method in case the phone number is incorrect or for additional notifications regarding the pickup.
                  nullable: true
                fullName:
                  type: string
                  description: Full name of the client sending the parcel, essential for identifying the sender and ensuring accurate handling of the pickup.
                  maxLength: 100
                companyTin:
                  type: string
                  description: The contract number of the requesting company.
                  minLength: 2
                  maxLength: 20
                companyName:
                  type: string
                  description: Name of the company requesting the pickup.
                  minLength: 2
                  maxLength: 255
                lockVersion:
                  type: integer
                  description: Version number for concurrency control to avoid conflicting updates. When using this method and making updates, the value of this parameter must be incremented by 1 for each subsequent change.
                  minimum: 1
                countryCode:
                  type: string
                  description: ISO Alpha-2 code for the pickup location.
                  pattern: "^[A-Z]{2}$"
                addressParts:
                  type: object
                  description: Detailed address information for the pickup location.
                  properties:
                    city:
                      type: string
                      description: The name of the city for the pickup location.
                      maxLength: 100
                    region:
                      type: string
                      description: The administrative area, state, or region for the pickup.
                      maxLength: 100
                    street:
                      type: string
                      description: The street name for the pickup location.
                      maxLength: 100
                    postCode:
                      type: string
                      description: The postal code of the pickup location.
                      maxLength: 10
                    building:
                      type: string
                      description: The building number or name at the pickup address.
                      maxLength: 100
                    flat:
                      type: string
                      description: The apartment or office number within the building.
                      maxLength: 10
                    block:
                      type: string
                      description: The specific block or section within a larger complex, if applicable.
                      maxLength: 100
                    note:
                      type: string
                      description: Additional instructions for the courier to access the pickup location.
                      maxLength: 100
                pickedTimeFrom:
                  type: string
                  format: date-time
                  description: Start of the pickup time window, selected from available time intervals provided by the method that returns available time slots.
                  pattern: "^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$"
                  nullable: true
                pickedTimeTo:
                  type: string
                  format: date-time
                  description: End of the pickup time window, selected from available time intervals provided by the method that returns available time slots.
                  pattern: "^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$"
                  nullable: true
            example:
              note: Update note for the pickup
              services: []
              phone: '420123456789'
              email: test@example.cz
              fullName: Updated Test User
              companyTin: CZ98765432
              companyName: Updated Test Company CZ
              lockVersion: 2
              countryCode: CZ
              addressParts:
                city: Prague
                region: Prague
                street: Národní
                postCode: '11000'
                building: '9'
                flat: '2'
                block: '1'
                note: Updated building entrance information
              pickedTimeFrom: '2024-12-02T14:00:00.000000Z'
              pickedTimeTo: '2024-12-02T18:00:00.000000Z'
      responses:
        '200':
          description: Pickup request updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier for the updated pickup request.
                    minimum: 1
                  number:
                    type: string
                    description: Reference number for the pickup request.
                    pattern: '^[A-Z]{4}\d{10}$'
                  status:
                    type: string
                    description: |
                      Current pickup status, representing the different stages in the pickup process.
                      Possible values include:
                        - Draft: Initial stage where the pickup request is created but not yet finalized.
                        - Created: The pickup request has been created and is ready for processing.
                        - AppointedCourier: A courier has been assigned to the pickup request.
                        - InProgress: The pickup process is underway.
                        - Done: The pickup has been successfully completed.
                        - ClientCanceled: The pickup was canceled by the client.
                        - NotCompleted: The pickup process could not be completed.
                        - Deleted: The pickup request has been removed from the system.
                        - ReceivedByCourier: The parcel has been received by the courier.
                  lockVersion:
                    type: integer
                    description: Updated version number for concurrency control.
                  note:
                    type: string
                    description: Updated notes for the courier.
                    maxLength: 255
                  pickedTimeFrom:
                    type: string
                    format: date-time
                    description: Updated start of the pickup time window.
                    pattern: "^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$"
                  pickedTimeTo:
                    type: string
                    format: date-time
                    description: Updated end of the pickup time window.
                    pattern: "^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$"
                  addressParts:
                    type: object
                    description: Updated address information for the pickup location.
                    properties:
                      city:
                        type: string
                        description: The name of the city for the pickup location.
                        maxLength: 100
                      region:
                        type: string
                        description: The administrative area, state, or region for the pickup.
                        maxLength: 100
                      street:
                        type: string
                        description: The street name for the pickup location.
                        maxLength: 100
                      postCode:
                        type: string
                        description: The postal code of the pickup location.
                        maxLength: 10
                      building:
                        type: string
                        description: The building number or name at the pickup address.
                        maxLength: 100
                      flat:
                        type: string
                        description: The apartment or office number within the building.
                        maxLength: 10
                      block:
                        type: string
                        description: The specific block or section within a larger complex, if applicable.
                        maxLength: 100
                      note:
                        type: string
                        description: Additional instructions for the courier to access the pickup location.
                        maxLength: 100
                  statuses:
                    type: array
                    description: Array of updated status objects tracking pickup status changes.
                    items:
                      type: object
              example:
                id: 28813
                number: PUCZ0000002671
                status: Draft
                lockVersion: 2
                note: Na Rizdvo Sobi
                pickedTimeFrom: '2024-12-02T14:00:00.000000Z'
                pickedTimeTo: '2024-12-02T18:00:00.000000Z'
