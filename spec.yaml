        - Shipments
      description: |
        This API method enables you to retrieve the status of a shipment by providing the transportation document number. By specifying the document number in the request, you can obtain information about the current location or status of the shipment, providing clients with real-time updates on the progress of their cargo.

        🔸**BasicTracking** provides a simplified tracking response focused on the shipment’s status history and, optionally, its related shipment numbers. Unlike **FullTracking**, it does not return detailed routing information, parcel-level data, undelivery reasons, return/redirect records, or extended metadata. This method is intended for quick, lightweight status checks.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - in: query
          name: 'numbers[]'
          description: Shipment`s numbers. Can accept either a single number or an array of numbers.
          schema:
            type: string
            example: SHPL1234567890
        - in: query
          name: extended
          description: |
            Parameter responsible for including in the response an array of objects listing all related shipments.
            To receive this data in the response, set the value to `1`.
          schema:
            type: string
            default: 0
          required: false
          example: 1
      responses:
        '200':
          description: Tracking response schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    description: Array of items in the invoice.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Transportation document id.
                        number:
                          type: string
                          description: Transportation document number.
                        history_tracking:
                          type: array
                          description: Array of tracking history statuses for the specified shipment.
                          items:
                            type: object
                            properties:
                              code:
                                type: string
                                description: |
                                 Tracking status code number.

                                 **A list of available statuses with their codes and descriptions of their meaning:**
                                 
                                 - `1` — Ready to send
                                 - `2` — Deleted
                                 - `4` — Accepted for sending
                                 - `5` — Sent from the Sender's Division
                                 - `6` — Arrived in the city of the Recipient
                                 - `7` — Arrived (at the Division)
                                 - `8` — Arrived (at the Postomat)
                                 - `9` — Closed
                                 - `10` — The shipment is closed and the money transfer is sent to the Sender
                                 - `11` — The shipment is closed and the sender has received the  money transfer
                                 - `13` — Arrival at the sorting center
                                 - `16` — Transferred to a partner for delivery
                                 - `101` — Uploaded to the courier for delivery to the address
                                 - `102` — Returns (sender ordered a return)
                                 - `103` — Refusal of shipment
                                 - `104` — Redirecting
                                 - `105` — Utilization
                                 - `106` — Received and created return shipment of Documents/Document Subtypes
                                 - `111` — Failed delivery attempt (in case of targeted delivery)
                                 - `112` — Delivery date postponed (for targeted delivery)
