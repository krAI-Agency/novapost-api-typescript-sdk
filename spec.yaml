      summary: Create Shipment
    get:
      security:
        - JWT: []
      tags:
        - Shipments
      description: |
        This API method enables you to retrieve a list of transportation documents (shipments) that you have created. By making a request with this method, you can access the transportation documents that belongs to you or your account. The response will include details of each shipment, such as the shipment ID, number, recipient, cargo detail, and other relevant information.</br>

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - in: query
          name: 'numbers[]'
          description: Search shipments by transportation document number. Can accept either a single search number or an array of numbers for conducting the search.
          schema:
            type: string
            example: SHPL6145344878
        - in: query
          name: 'ids[]'
          description: Search shipments by transportation document ids.
          schema:
            type: integer
            format: int32
            example: 113622
        - in: query
          name: limit
          description: Max number of items to return on page.
          schema:
            type: integer
            format: int32
            example: 1
