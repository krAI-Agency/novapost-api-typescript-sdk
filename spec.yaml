  /tracking-push/subscribers:
    post:
      security:
        - JWT: []
      tags:
        - Webhooks
      description: |
        This endpoint is used to create a new subscription for receiving tracking notifications via webhooks.
        The subscription can be of various types, such as individual or company-based, and is essential for clients who want to receive real-time updates about shipment statuses.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      operationId: createSubscriber
      parameters:
        - in: query
          name: type
          description: |
            The type of subscription to be created. This is a mandatory field and can take values such as:
            - **individual**: For personal accounts.
            - **numbers**: For tracking specific shipment numbers.
            - **legal**: For business accounts, requiring additional company details.
          required: true
          schema:
            type: string
            enum:
              - individual
              - numbers
              - legal
            example: numbers
        - in: query
          name: url
          description: |
            The callback URL where webhook notifications will be sent. 
            This is a mandatory field and must be a valid URL.
            The URL should be capable of receiving POST requests with JSON payloads.
          required: true
          schema:
            type: string
            format: uri
            example: https://api.webhook.test/test_endpoint
            minLength: 3
        - in: query
          name: isActive
          description: Indicates whether the subscription should be active immediately upon creation. If set to `true`, the webhook will start sending notifications as soon as the subscription is confirmed. Defaults to `false` if not provided.
          schema:
            type: boolean
            default: false
          required: true
          example: true
        - in: query
          name: phone
          description: |
            The phone number associated with the subscription.
            This parameter is required when the subscription type is `individual`.
            The phone number must be in international format, for example, 380637445555.
          required: false
          schema:
            type: string
            example: 380630000001
        - in: query
          name: secretToken
          description: |
            Webhook Authorization Token: Maximum Length 600 Characters
          required: false
          schema:
            type: string
            example: k4MzM1NywiZXhwIjoxNzM3
        - in: query
          name: eventTypes
          description: |
            A list of event types that the subscription will listen to. 
            This parameter allows you to specify which events should trigger webhook notifications. 
            If no value is provided, the subscription will be created for all event types by default.
          schema:
            type: array
            items:
              type: string
            uniqueItems: true
          example: 
          required: false
        - in: query
          name: sendWarnings
          description: |
            Determines if email warnings should be sent in case of issues with the specified webhook URL.
            If enabled, the system will send notifications about delivery problems or other errors.
            Defaults to `false`.
          schema:
            type: boolean
            default: false
          required: false
          example: true
        - in: query
          name: warningEmail
          description: |
            The email address where warnings about endpoint issues will be sent.
            It is required if `sendWarnings` is set to `true`.
            The email address should be valid and active to ensure delivery of warnings.
          schema:
            type: string
            format: email
            example: example@novadigital.com
          required: false
        - in: query
          name: companyTins
          description: |
            A list of company tax identification numbers relevant to the subscription type `legal`.
            This parameter is essential for legal subscriptions to verify the company's identity.
            Each TIN should be a valid UUID.
          schema:
            type: array
            items:
              type: string
              format: uuid
              example: 
          required: false
      responses:
        '201':
          description: Subscription successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique identifier for the created subscription.
                    example: f5300824-58a9-496b-ac3b-bee156844fdf
                  type:
                    type: string
                    description: The type of subscription created.
                    example: numbers
                  secretToken:
                    type: string
                    description: Webhook Authorization Token
                    example: k4MzM1NywiZXhwIjoxNzM3
                  url:
                    type: string
                    format: uri
                    description: The callback URL for the subscription.
                    example: https://api.example.com/webhook
                  isActive:
                    type: boolean
                    description: Indicates if the subscription is currently active.
                    example: true
                  is_active:
                    type: boolean
                    description: Deprecated. Legacy field kept for backward compatibility. Use `isActive` instead.
                    example: true
                  phone:
                    type: string
                    description: The phone number associated with the subscription.
                    example: '380630000001'
