                       **🔻This field is required**
                      maxLength: 100
                    ioss:
                      type: string
                      description: The IOSS (Import One-Stop Shop) number is an optional input used to facilitate the VAT declaration process for shipments from non-EU countries with a declared value of up to EUR 150. It is utilized by shippers using the IOSS process to simplify customs procedures for deliveries to private customers in the EU. This field is available for shipments where the sender's country is outside the EU and the destination is within the EU.
                      maxLength: 12
                      pattern: "/^[a-zA-Z0-9]*$/u"
                    countryCode*:
