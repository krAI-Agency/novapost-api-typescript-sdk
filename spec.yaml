info:
  version: 1.0.0
  title: API Nova Post
  description: '<p>For developers’ convenience, we have created the unified <b>Nova Post API Portal</b>, which provides a complete toolkit for fast and easy integration:</p><ul><li>🧭 <a href="https://api-portal.novapost.com/en/api-nova-post/start" target="_new"><b>Step-by-step instructions</b></a> for connecting and testing integration</li><li>🔑 <a href="https://api-portal.novapost.com/en/api-nova-post/start/api-keys" target="_new"><b>Guidelines for creating test and production API keys</b></a></li><li>🧰 <a href="https://api-portal.novapost.com/en/api-nova-post/start/api-call-tools/" target="_new"><b>Postman collection</b></a> with ready-to-use requests for API testing</li><li>📄 <a href="https://api-portal.novapost.com/en/api-methods" target="_new"><b>Additional technical documentation</b></a> — examples, request and response structures</li><li>💬 <a href="https://api-portal.novapost.com/en/help-center" target="_new"><b>Developer support contacts</b></a></li><li>👉 Visit the <a href="https://api-portal.novapost.com/en/" target="_new"><b>API Portal</b></a> for full information and materials</li></ul><table><thead><tr><th>Section</th><th>Details</th></tr></thead><tbody><tr><td>Registration and Obtaining an Access Key</td><td><ul><li>Email <a href="mailto:servicedesk@novapost.com" target="_new">servicedesk@novapost.com</a> to register a user for the API.</li><li>During the registration process, you will receive an API access key. Make sure to store this information in a secure place.</li></ul></td></tr><tr><td>Authentication</td><td><ul><li>Use the received API access key to generate an access key with a lifetime of 1 hour.</li><li>Use the received access key (JWT token) for each API request.</li><li>Authenticate by including the access key in the Authorization header.</li></ul></td></tr><tr><td>Endpoint Definition</td><td><ul><li>Set the endpoint (URL) for accessing the API.<ul><li><a href="https://api.novapost.com/v.1.0" target="_new">https://api.novapost.com/v.1.0</a> — Production environment</li><li><a href="https://api-stage.novapost.pl/v.1.0" target="_new">https://api-stage.novapost.pl/v.1.0</a> — Test environment</li></ul></li></ul></td></tr><tr><td>Documentation Review</td><td><ul><li>Familiarize yourself with the API documentation.</li><li>Study the available methods, parameters, data formats, usage limitations, and other necessary information for successful interaction with the API.</li></ul></td></tr><tr><td>Request Creation</td><td><ul><li>Formulate your request based on the API documentation.</li><li>Specify the request method (GET, POST, PUT, DELETE, etc.), necessary parameters, and data to be sent.</li></ul></td></tr><tr><td>Response Handling</td><td><ul><li>Process the responses from the server.</li><li>Check the response status code to ensure that the request was successful.</li><li>Extract and use the necessary data from the API response.</li></ul></td></tr><tr><td>Error Management</td><td><ul><li>Handle possible errors and exceptional situations when working with the API.</li><li>Pay attention to the error codes and error messages provided by the API to respond appropriately.</li></ul></td></tr></tbody></table><p>It is important to remember that the exact steps and details for connecting to an API may vary depending on the specific API and platform you are working with. Make sure to follow the instructions provided by the API developers and use up-to-date documentation.</p>'
tags:
  - name: PHP SDK
    description: NovaPost API SDK for PHP
paths:
  /sdk/php:
    patch:
      tags:
        - SDK
      summary: NovaPost API SDK for PHP
      description: >-
        <p>The Novapost API SDK is the official PHP SDK (Software Development Kit) for integration with the Nova Post API. With this package, you can quickly and conveniently connect such Nova Post features to your PHP application as shipment creation, parcel tracking, and other services.</p></br>

        <b>Features/Advantages:</b></br>
        <ul>
          <li><b>Official Nova Post support</b> — guaranteed relevance, stability, and developer assistance.</li>
          <li><b>Compliance with modern PHP standards</b> — compatibility with modern frameworks and libraries.</li>
          <li><b>Flexibility and extensibility</b> — replace logger, HTTP client, token storage.</li>
          <li><b>Easy integration</b> — installation via Composer, example usage included.</li>
        </ul>

        <b>Useful Links:</b></br>
        <ul>
          <li><a href="https://packagist.org/packages/novadigital/novapost-api-sdk" target="_new">Packagist — Official Package</a></li>
          <li><a href="https://github.com/NovaDigitalHub/novapost-api-sdk" target="_new">GitHub Repository</a></li>
          <li><a href="https://github.com/NovaDigitalHub/novapost-api-sdk/issues" target="_new">Issue Tracker (Support & Feedback)</a></li>
        </ul>

        <h2>Requirements</h2>

        <ul>
          <li>
            <strong>Requires</strong> — Runtime dependencies (required for production use):
            <ul>
              <li><code>php &gt;= 8.0</code> — the package requires PHP 8.0+.</li>
              <li><code>guzzlehttp/guzzle ^7.0</code> — HTTP client for making requests.</li>
              <li><code>psr/container ^2.0</code> — compatibility with PSR dependency containers.</li>
              <li><code>psr/log ^3.0</code> — PSR-compliant logging interfaces.</li>
            </ul>
          </li>

          <li>
            <strong>Requires (Dev)</strong> — Dev dependencies (needed only for development/CI):
            <ul>
              <li><code>phpstan/phpstan ^2.1</code> — static analysis.</li>
              <li><code>phpunit/phpunit ^9.6</code> — unit tests.</li>
              <li><code>squizlabs/php_codesniffer ^3.13</code> — code style/linting.</li>
              <li><code>vlucas/phpdotenv ^5.6</code> — loading environment variables from <code>.env</code>.</li>
            </ul>
          </li>

          <li><strong>Suggests:</strong> None</li>
          <li><strong>Provides:</strong> None</li>
          <li><strong>Conflicts:</strong> None</li>
          <li><strong>Replaces:</strong> None</li>
        </ul>

        <h2>Installation</h2></br>

        To get started, install the SDK via <a href="https://getcomposer.org/" target="_new">Composer</a> by running the following command:

        <pre><code>composer require novadigital/novapost-api-sdk</code></pre>

        <h2>Working with the SDK</h2>

        <h3>Client Initialization</h3></br>

        After installing the SDK, initialize the client using <code>NovaPostApiFactory</code>.</br>
        This allows you to quickly create a client for interacting with the Nova Post API.</br>
        Add the following example to your code:

        <pre><code>
        use NovaDigital\NovaPost\NovaPostApiFactory;
        use NovaDigital\NovaPost\Exception\ApiException;
        use NovaDigital\NovaPost\Resources\Division;

        $apiKey = 'YOUR_API_KEY';

        try {
          $novaPostApi = (new NovaPostApiFactory())($apiKey);
          $searchParams = [
            'textSearch' => 'berlin',
            'divisionCategories' => [Division::DIVISION_CATEGORY_POSTOMAT]
          ];
          $divisions = $novaPostApi->divisions()->get($searchParams);
        } catch (ApiException $e) {
            echo "API Error: " . $e->getMessage();
        }
        </code></pre>

        <h3>SDK Method Example</h3></br>

        SDK methods have the same names and parameters as the corresponding client API methods.</br>
        To calculate shipment cost, use this example:

        <pre><code>
        try {
          $shipmentData = [
            // shipment calculation data
        ];
        $calculationResult = $novaPostApi->shipments()->calculate($shipmentData);
        } catch (ApiException $e) {
          echo "API Error: " . $e->getMessage();
        }
        </code></pre>

        <h2>Advanced Features</h2>

        <p>
          The SDK allows you to replace standard services (logger, HTTP client, 
          token storage, etc.) with your own implementations using the 
          <code>ContainerBuilder</code> dependency container.
        </p>

        <p>This is useful if you need to:</p>

        <ul>
          <li>Integrate the SDK with your framework’s logging system.</li>
          <li>Configure an HTTP client with custom parameters or middleware.</li>
          <li>Use your own storage mechanism for JWT tokens.</li>
        </ul>

        <p>
          To do this, pass your custom services to the client factory through 
          <strong>ContainerBuilder</strong>.
        </p>

        <h3>Using ContainerBuilder</h3>

        <p>For more flexible configuration, you can use <code>NovaDigital\NovaPost\DI\ContainerBuilder</code> to customize different aspects of the client.</p>

        <pre><code>
        use NovaDigital\NovaPost\DI\ContainerBuilder;
        use NovaDigital\NovaPost\Exception\ApiException;
        use NovaDigital\NovaPost\NovaPostApiFactory;
        use NovaDigital\NovaPost\Storage\JwtTokenStorageInterface;
        use Psr\Log\LoggerInterface;
        use My\Awesome\MyLogger;
        use My\Awesome\DbJwtTokenStorageProvider;

        $apiKey = 'YOUR_API_KEY';

        try {
          $containerBuilder = (new ContainerBuilder())
            ->bind(LoggerInterface::class, MyLogger::class)
            ->bind(JwtTokenStorageInterface::class, DbJwtTokenStorageProvider::class);

          $novaPostApi = (new NovaPostApiFactory())(
            apiKey: $apiKey,
            containerBuilder: $containerBuilder
          );

          $payload = [
            // calculation parameters
          ];

          $response = $novaPostApi->shipments()->calculate($payload);

        } catch (ApiException $e) {
            echo 'API Error => ' . $e->getMessage() . ' (Code => ' . $e->getCode() . ')';
        }
        </code></pre>

        <h3>Available Service Overrides</h3></br>

        With <b>ContainerBuilder</b>, you can override the following services:

        <table>
          <thead>
            <tr><th>Service</th><th>Purpose</th></tr>
          </thead>
          <tbody>
            <tr><td>Psr\Log\LoggerInterface</td><td>Custom logging</td></tr>
            <tr><td>Psr\Http\Client\ClientInterface</td><td>Custom HTTP client configuration</td></tr>
            <tr><td>NovaDigital\NovaPost\Storage\JwtTokenStorageInterface</td><td>Custom JWT token storage</td></tr>
            <tr><td>NovaDigital\NovaPost\Http\ResponseHandlerInterface</td><td>Custom response processing</td></tr>
            <tr><td>NovaDigital\NovaPost\Http\RetryHandlerInterface</td><td>Custom retry logic</td></tr>
          </tbody>
        </table>

        <h3>PSR Compliance</h3></br>

        The <b>NovaPost API SDK</b> complies with the following PSR standards, ensuring compatibility, modern design, and high code quality:
        
        <table>
          <thead>
            <tr>
              <th>Standard</th>
              <th>Purpose</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>PSR-4: Autoloader</strong></td>
              <td>For class autoloading</td>
            </tr>
            <tr>
              <td><strong>PSR-11: Container Interface</strong></td>
              <td>For a flexible dependency container</td>
            </tr>
            <tr>
              <td><strong>PSR-3: Logger Interface</strong></td>
              <td>Allows using any compatible logger</td>
            </tr>
            <tr>
              <td><strong>PSR-7: HTTP Message Interface</strong></td>
              <td>Used for all API requests and responses</td>
            </tr>
            <tr>
              <td><strong>PSR-18: HTTP Client</strong></td>
              <td>For sending HTTP requests</td>
            </tr>
            <tr>
              <td><strong>PSR-17: HTTP Factories</strong></td>
              <td>For creating PSR-7 messages</td>
            </tr>
            <tr>
              <td><strong>PSR-12: Extended Coding Standard</strong></td>
              <td>For coding style</td>
            </tr>
          </tbody>
        </table>

        Following these standards makes the SDK reliable, predictable, and easy to integrate into any modern PHP application.

      responses:
        '200':
          description: OK
  /test-api-keys:
    post:
      tags:
        - Authorization
      summary: Create or renew a test API key (Sandbox only)
      description: |
        Public endpoint available only in non-production environments (Sandbox) 
        to create or renew a test API key for a client identified by phone.

        Requirements:
        - The phone number must be registered in the Client Portal (EBC): https://my.novapost.com/
        - UA key generation is currently not supported

        Behavior:
        - If a key already exists and is Active, a repeated call within the same day 
          will return the same key
        - If expired, the key will be reactivated with a new expiration date
        - If deleted by cleanup, a new key will be created
        - Only one active key is allowed per phone, limited to one request per day

        Next step:
        After receiving the apiKey, you must generate a temporary JWT by calling 
        [GET /clients/authorization](https://api.novapost.com/developers/index.html#get-/clients/authorization). The JWT is required for all authorized requests. 
        Paste the jwt into the **[Authorize](https://api.novapost.com/developers/index.html#auth)** dialog under the `JWT` scheme 
        in this documentation to enable Try-it-out.</br>

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      x-environment:
        allowed: [STAGE]
        forbidden: [PROD]
      security: []  # public route
      x-autoAuth:
        targetSecurityScheme: ApiKeyAuth
        responseField: apiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [phone]
              properties:
                phone:
                  type: string
                  description: Phone number registered in EBC. Format like 49XXXXXXXXX (no '+'). UA keys generation is currently not supported.
                  example: "498213437654"
            examples:
              byPhone:
                summary: Request by phone
                value: { "phone": "498213437654" }
      responses:
        '200':
          description: Test API key created or returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestApiKeyResponse'
              example:
                  value:
                    apiKey: "78b97003b587d7758bede604fd185e3e"
                    createdAt: "2025-07-24T09:00:00Z"
                    expDate: "2026-07-24T23:59:59Z"
                    status: "Active"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  summary: Missing required parameter
                  value: { success: false, errors: ["Missing required parameter: phone"] }
                invalid:
                  summary: Invalid phone format
                  value: { success: false, errors: ["Invalid phone format"] }
        '404':
          description: Client not found in EBC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value: { success: false, errors: ["Client not found"] }
        '409':
          description: Multiple matching clients found in EBC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict:
                  value: { success: false, errors: ["Multiple matching clients found"] }
        '429':
          description: Daily limit exceeded for this user (one request per day)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                limit:
                  value: { success: false, errors: ["Daily limit reached"] }
        '503':
          $ref: '#/components/responses/Time-out'
      x-business-rules:
        - Exact match search in EBC by phone. If 0 results -> 404. If >1 -> 409.
        - If key exists and status=Active -> on same day return as is; on another day prolong expDate +1 year.
        - If key exists and status=Expired -> set Active and expDate +1 year.
        - If key deleted by cleanup worker (>90 days after Expired) -> create a new one.
        - One key per phone. One creation request per day per user.
        - IP is not a blocking factor for renewal.
  /clients/authorization:
    get:
      x-autoAuth:
        targetSecurityScheme: JWT
        responseField: jwt
      tags:
        - Authorization
      summary: Generate a temporary JWT-token
      description: |
        Issues a temporary JWT-token for making authorized API requests. 
        A valid apiKey must be provided as a query parameter.

        How to obtain an apiKey:
        - In Sandbox, use POST `/test-api-keys` with a registered phone number 
          from the Client Portal (EBC): https://my.novapost.com/
        - In PROD, use your personal apiKey provided by your manager

        Usage:
        - Call GET `/clients/authorization?apiKey={apiKey}`
        - On success, copy the jwt from the response
        - Open the **[Authorize](https://api.novapost.com/developers/index.html#auth)** dialog in this documentation, select the `JWT` scheme, 
          and paste the jwt
        - All Try-it-out requests will then automatically include 
          `Authorization: {jwt}`

        Notes:
        - The jwt is valid for ~1 hour; request a new one after expiry
        - Do not store jwt beyond its TTL
        - The `/test-api-keys` route is not available in PROD</br>

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - in: query
          required: true
          name: apiKey
          schema:
           type: string
          description: To utilize this method, a personal API key is required.
          # example: 51717777d45837c77664f21a0680c74d
      responses:
        '200':
          description: JWT-token
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                    description: Personal JWT-token, expires after one hour to prevent any fraud, requiring a new request to generate a fresh token.
                    format: json
                    example: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJucCIsImlhdCI6MTY4NTYyNzQxNCwiZXhwIjoxNjg1NjMxMDE0LCJjaWQiOiI1YzQxMmUzYS01ODY4LTQ4YjktYTYwYS0wZTAzOTI4NGVjNDYiLCJyZWYiOiI2NDI0NmRkMzg0ZWI3Yzg2MmMwMzg3YzAifQ.MmhM9rHCYItjA5a7B9PtrdKUKRiHhN43UotWKtKjt78"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Validation'
        '503':
          $ref: '#/components/responses/Time-out'
  /divisions:
    get:
      security:
        - JWT: []
      tags:
        - Dictionaries
      description: |
        This API method enables you to obtain a list of own and partner`s cargo warehouses (divisions) and  parcel lockers available within countries. By providing the country code as a parameter, you can retrieve a comprehensive list of cargo warehouses and related details. The response will typically include information like warehouse name, number, address, ID, country and city details, warehouse type, and other relevant attributes. This data can be useful to generate a transportation document (shipment).

        🔹**Description of control elements:**

        **SCHEMA**
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - in: header
          name: Accept-language
          description: To receive warehouse description in a certain language please put required language code (ISO 639-1 standard) in a header parameter with a name - accept-language. If there is no translation for the selected language, then English will be displayed
          schema:
            type: string
            enum:
              - cz
              - de
              - en
              - es
              - fr
              - et
              - hu
              - it
              - lt
              - lv
              - nl
              - pl
              - ro
              - sk
              - uk
        - in: query
          name: 'countryCodes[]'
          description: To receive a list of cargo warehouses and  parcel lockers in a certain country please choose required country code from the list. Use code, according to the ISO 3166-1 Alpha-2 standard.
          schema:
            type: array
            items:
              type: string
              enum:
                - CZ
                - DE
                - EE
                - ES
                - FR
                - GB
                - HU
                - IT
                - LT
                - LV
                - MD
                - NL
                - PL
                - RO
                - SK
                - UA
        - in: query
          name: limit
          description: Max number of items to return.
          schema:
            type: integer
            format: int32
            default: 15
            example: 1
        - in: query
          name: page
          description: Page number to return.
          schema:
            type: integer
            format: int32
            example: 1
        - in: query
          name: 'settlementIds[]'
          description: List of settlement identifiers used to filter divisions or terminals by their location. Each ID corresponds to a unique settlement in the system.
          schema:
            type: array
            items:
              type: integer
        - in: query
          name: 'divisionCategories[]'
          description: Defines the operational category of a division to specify its type and function within the logistics network. Use one or multiple categories from the list.
          schema:
            type: array
            items:
              type: string
              enum:
                - Postomat
                - PostBranch
                - CargoBranch
                - PUDO
        - in: query
          name: 'statuses[]'
          description: Filters divisions by their operational status. Indicates whether the branch is active, temporarily closed, or in preparation for opening.
          schema:
            type: array
            items:
              type: string
              enum:
               - Working
               - NotWorking
               - NotWorkingTemporary
               - InProcessOpening
        - in: query
          name: 'prohibitedSending'
          description: Indicates whether sending parcels from this division is available. If `true` – sending from this division is not possible.
          schema:
            type: boolean
            enum:
                - true
                - false
        - in: query
          name: 'prohibitedIssuance'
          description: Indicates whether parcel delivery to this division is available. If `true` – receiving parcels at this division is not possible.
          schema:
            type: boolean
            enum:
                - true
                - false
        - in: query
          name: 'latitude'
          description: >
            Geographical latitude of the division, used for positioning on maps and calculating distances.
            Example value: 49.8005164984.
          schema:
            type: number
            format: float
        - in: query
          name: 'longitude'
          description: >
            Geographical longitude of the division, used for positioning on maps and calculating distances.
            Example value: 22.9404162762.
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Divisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_page:
                    type: integer
                    description: Current page.
                    minimum: 1
                  last_page:
                    type: integer
                    description: Total pages found.
                    minimum: 1
                  per_page:
                    type: integer
                    description: Current objects` limit for a single page.
                    minimum: 1
                  total:
                    type: integer
                    description: Total objects found.
                    minimum: 0
                  from:
                    type: integer
                    nullable: true
                  to:
                    type: integer
                    nullable: true
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Warehouse`s id code.
                          minimum: 1
                        name:
                          type: string
                          description: Description of warehouse.
                          minLength: 1
                        shortName:
                          type: string
                          description: Short description of warehouse.
                          minLength: 1
                        externalId:
                          type: string
                          description: Internal data, not for use.
                        source:
                          type: string
                          description: Source of information about a division (for instance, NPUA, NPAX, InPost, NPDepartment, NPMD1C, GLS_CZ, DPD, Venipak, SPS, ExpressOne. The list grows as additional partners are incorporated).
                          nullable: true
                        countryCode:
                          type: string
                          description: Country code where warehouse is located according to the ISO 3166-1 Alpha-2 standard.
                          pattern: "^[A-Z]{2}$"
                        settlement:
                          type: object
                          description: Detailed information about the location where the warehouse is located.
                          properties:
                            id:
                              type: integer
                              description: City`s id code.
                              minimum: 1
                            name:
                              type: string
                              description: City or town name.
                              minLength: 2
                            region:
                              type: object
                              description: District of city`s location.
                              properties:
                                id:
                                  type: integer
                                  description: District`s id code.
                                  minimum: 1
                                name:
                                  type: string
                                  description: District name.
                                  minLength: 2
                                parent:
                                  type: object
                                  description: Region of city`s location.
                                  properties:
                                    id:
                                      type: integer
                                      description: Region`s id code.
                                      minimum: 1
                                    name:
                                      type: string
