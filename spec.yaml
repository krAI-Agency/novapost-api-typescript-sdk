  /pickups/{id}/status:
    put:
      description: |
        This method allows updating the status of an existing courier pickup request. It is specifically designed for transitioning a pickup request from `Draft` to `Created`. 
        
        While the request is in `Draft` status, it remains in a preparatory phase where all necessary shipments can be added. Once the status is updated to `Created`, the shipment management system recognizes the pickup as finalized and ready for processing by the courier service.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      security:
        - JWT: []
      tags:
        - Pickups
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the pickup request.
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: The unique identifier of the pickup request being updated.
                  minimum: 1
                status:
                  type: string
                  description: This field is used to update the status of a pickup request to indicate that the pickup request is finalized and ready for processing by the shipment management system.
                  enum:
                    - Created
                lockVersion:
                  type: integer
                  description: Version number for concurrency control to avoid conflicting updates. When using this method and making updates, the value of this parameter must be incremented by 1 for each subsequent change.
                  minimum: 1
                note:
                  type: string
                  description: A required note or comment providing additional information about the reason for the status update. This field must be filled when changing the status to ensure proper tracking and context.
                  maxLength: 255
              required:
                - id
                - status
                - lockVersion
            example:
              id: 28884
              status: "Created"
              lockVersion: 2
              note: "Pickup request finalized and ready for courier assignment"
