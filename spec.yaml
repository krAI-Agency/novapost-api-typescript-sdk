      parameters:
        - in: path
          name: code
          required: true
          description: >-
            Alpha-code of the destination country.
          schema:
            type: string
            example: "PL"
      responses:
        '200':
          description: Successful response with customs-fee configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  customFeeActive:
                    type: boolean
                    description: |-
                      Indication of the possibility of paying customs duties by the sender.
                      Possible values:
                        - `true` — payment is possible
                        - `false` — payment is not possible
                    example: true
                  declaredCost:
                    type: number
                    description: >-
                      Maximum parcel value (in the recipient country's currency)
                      for which the sender may pay customs duties.
                    example: 100
              examples:
                ok:
                  value:
                    customFeeActive: true
                    declaredCost: 100
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Unprocessable entity – invalid country code
          content:
            application/json:
              schema:
                type: object
                properties:
                  ErrorMessage:
                    type: string
                    example: "The selected country is invalid."
        '503':
          $ref: '#/components/responses/Time-out'  
  /exchange-rates/conversion:
    post:
      security:
        - JWT: []
      tags:
        - Services
      description: |
        This API method allows you to retrieve the exchange rates for different currencies based on a specific amount and your own currency. By providing the amount and the currency code, you can access the current exchange rates against various other currencies. The response will include the exchange rates for the specified amount in comparison to each currency, allowing you to see currency conversions.</br>

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      requestBody:
        description: Optional description in *Markdown*
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  format: float
                  description: Amount of money to get sum in exchange rate for specified currency. Must include 2 decimal places.
                  example: 100.00
                countryCode:
                  type: string
                  description: Sender`s country code, according to the ISO 3166-1 Alpha-2 standard.
                  pattern: "^[A-Z]{2}$"
                currencyCode:
                  type: string
                  description: Currency code to get exchange rate, according to the iso-4217 standard.
                  pattern: "^[A-Z]{3}$"
                date:
                  type: string
                  format: date-time
                  description: Operation date for exchange rate in ISO 8601 format.
                  example: "2023-10-16T00:00:00Z"
              example:
                amount: 100.00
                countryCode: UA
                currencyCode: USD
                date: '2023-10-16T00:00:00.000000Z'
      responses:
        '200':
          description: shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestCurrency:
                    type: object
                    description: Initial amount of money and currency for exchange.
                    properties:
                      currencyCode:
                        type: string
                        description: Currency code being exchanged, compliant with the ISO-4217 standard.
                        pattern: "^[A-Z]{3}$"
                      amount:
                        type: number
                        format: float
                        description: Amount of money being exchanged. Must include 2 decimal places.
                        example: 100.00
                  mainCurrency:
                    type: object
                    description: Calculation of the exchange amount in the currency of the country which countryCode was specified.
                    properties:
                      currencyCode:
                        type: string
                        description: Currency of the country which countryCode was specified, according to the iso-4217 standard.
                        pattern: "^[A-Z]{3}$"
                      amount:
                        type: number
                        format: float
                        description: Amount of money in exchange rate of currency for specified country. Must include 2 decimal places.
                        example: 317.18
                  convertedCurrencies:
                    type: array
                    description: List of the calculations for available current exchange rates against various other currencies based on a specified amount of money in request. 
                    items:
                      type: object
                      properties:
                        currencyCode:
                          type: string
                          description: Currency code, according to the iso-4217 standard.
                          pattern: "^[A-Z]{3}$"
                        amount:
                          type: number
                          format: float
                          description: Amount of money counted in currency`s exchange rate. Must include 2 decimal places.
                          example: 100.00
              example:
                requestCurrency:
                  currencyCode: USD
                  amount: 100.00
                mainCurrency:
                  currencyCode: UAH
                  amount: 3662.16
                convertedCurrencies:
                  - currencyCode: TND
                    amount: 317.18
                  - currencyCode: CZK
                    amount: 2320.03
                  - currencyCode: BRL
                    amount: 504.08
                  - currencyCode: TRY
                    amount: 2755.78
                  - currencyCode: RON
                    amount: 472.25
                  - currencyCode: EUR
                    amount: 95.02
                  - currencyCode: MDL
                    amount: 1823.15
                  - currencyCode: ZAR
                    amount: 1956.6
                  - currencyCode: NZD
                    amount: 168.27
                  - currencyCode: SAR
                    amount: 375.59
                  - currencyCode: LYD
                    amount: 489.62
                  - currencyCode: PLN
                    amount: 437.49
                  - currencyCode: GBP
                    amount: 82.31
                
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Validation'
        '503':
          $ref: '#/components/responses/Time-out'
      summary: Exchange rates
  /shipments:
    post:
      security:
        - JWT: []
      tags:
        - Shipments
      description: |
        Create a Shipment Document. This API method is engineered to streamline the process of generating a shipping document for logistics operations through Nova Post. By submitting key data, such as the originating and destination addresses for the shipment, users can effortlessly create a document detailing the transportation of goods. This method includes optional fields for customs authorities, accommodating shipments that cross borders. The API response will provide the unique identifier of the generated document along with other relevant information.

        Additional requirement:
        For shipments that require customs clearance (imports), the client invoice must be uploaded as a file through the [POST /shipments/uploads/{id}](https://api.novapost.com/developers/index.html#post-/shipments/uploads/-id-) method (after shipment creation).</br>
        
        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      requestBody:
        description: Optional description in *Markdown*
        required: true
        content:
          application/json:
            schema:
              type: object
              required:              
              - sender
              properties:
                status:
                  type: string
                  description: |
                    Signifies the current status of the transportation document, tracking its progress through the shipping lifecycle. Statuses detail each critical phase:
                      - Draft: The document is in its preliminary stage, not yet finalized.
                      - Accepted: Reviewed and accepted, the document is ready for the next steps.
                      - Issued: The document has been completed and is ready for shipping.
                      - ReadyToShip: Indicates that the shipment is prepared for transport following the creation of the express waybill. Only this value can be specified when creating a shipment.
                      - Deleted: The document has been deleted from the system.
                      - Returned: The shipment has been returned to its sender.
                      - Utilized: Indicates that the physical goods associated with the transportation document have been disposed of or destroyed and the document is closed.
                  enum:
                    - ReadyToShip
                clientOrder:
                  type: string
                  description: Represents all potential order identifiers associated with the shipment. These identifiers are set by the customer for internal tracking purposes and are crucial for tracking the shipment throughout its journey. All entered values can be tracked in the shipment's tracking system.
                  maxLength: 50
                note:
                  type: string
                  description: Any additional information or special instructions that pertain to the order can be included here. This could encompass delivery instructions, special handling requests, or other pertinent details that facilitate the handling and processing of the shipment.
                  maxLength: 255
                payerType*:
                  type: string
                  description: |
                    Identifies who is responsible for the payment of delivery services. The payer type determines which party bears the cost:
                      - Sender: The party sending the goods pays for the delivery.
                      - Recipient: The party receiving the goods is responsible for the delivery cost.
                      - ThirdPerson: A third party, not the sender or recipient, pays for the delivery services. When selecting 'ThirdPerson', the field 'payerContractNumber' must be populated with the contract number of the paying party. For more detailed information, refer to the article on [Payment for Delivery Services via Nova Post API](https://api-portal.novapost.com/en/api-methods/payment/).
                    This field is also referenced when generating an invoice.

                    **🔻This field is required**
                  enum:
                    - Sender
                    - Recipient
                    - ThirdPerson
                payerContractNumber:
                  type: string
                  description: This field is required when the 'payerType' is set to 'ThirdPerson'. It should contain the contract number. For clients from Ukraine, it is also acceptable to provide the tax identification number (EDRPOU) instead of the contract number. Additionally, this field must be completed for the sender as the payer when non-cash transactions are used. Failure to provide this information will default the payment method to cash. Ensure the information is accurate, as it is essential for processing the payment. For more detailed information, refer to the article on [Payment for Delivery Services via Nova Post API](https://api-portal.novapost.com/en/api-methods/payment/).
                  minLength: 2
                  maxLength: 20
                  nullable: true
                services:
                  type: array
                  description: Contains information about additional services for the shipment.
                  properties:
                    serviceCode:
                      type: string
                      description: |
                       The code indicating the service.
                       
                       **A list of available codes and descriptions of their meanings:**
                        
                        - `COD` — The Cash on Delivery (COD) service allows the recipient to pay for the goods directly upon receiving them, without the need for prepayment. The sender can add this service to the shipment, and the recipient has the option to pay for the goods upon delivery and inspect them before making the payment, subject to payment method restrictions established for specific countries.
                        Available directions:

                        - Poland → Ukraine
                        - Czech Republic → Ukraine
                        - Germany → Ukraine
                        - Slovakia → Ukraine
                        - Czech Republic → Czech Republic
                        - Poland → Poland
                        - Germany → Germany
                        - Romania → Moldova

                       🔸**The COD service is planned to expand to other countries and delivery directions in the future, both for international shipments and within European countries.**

                       🔹**This field is required for the `services` group.**
                    amount:
                      type: number
                      description: |
                       The total amount the recipient must pay under the COD service.

                       🔹**This field is required for the `services` group.**
                    payerType:
                      type: string
                      description: |
                       Determines who is responsible for paying for the service. The payer type determines which party bears the costs:

                       - `Recipient` — The only allowed value for the COD service.

                       🔹**This field is required for the `services` group.**
                    additionalParameters:
                      type: string
                      description: Additional parameters for the service.
                      properties:
                       cod:
                        type: string
                        description: |
                         Additional parameters for configuring COD.

                         🔹**These parameters are mandatory and required only for the COD service**
                        properties:
                         bankAccount:
                          type: object
                          description: Information describing the bank account details to which the funds will be transferred. Includes the transfer amount, transaction currency, account identifiers, and the party responsible for paying the service fee.
                          properties:
                           amount:
                            type: number
                            description: |
                             The amount that will be transferred to the sender’s account after payment. Specifies the amount the recipient must pay upon receipt. Automatic currency conversion is possible depending on the sender's or recipient's country.
                         
                             🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**
                           currencyCode:
                            type: string
                            description: |
                             The currency for the transaction, defined by the sender’s contract.
                             Specified according to the ISO 4217 standard.
                         
                             🔸**By default, the currency of the sender’s country is used, but it is possible to set the currency manually (Feature under development)/**
                             **Pattern:** ^[A-Z]{3}$
                           bankAccountId:
                            type: string
                            description: |
                             Unique identifiers of the account where the transfer will be made.

                             🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**
                             
                             🔸**Must contain the tax identification number or equivalent identifier (EDRPOU, TIN, NIP).**
                           bankAccountName:
                            type: string
                            description: |
                             Name of the account where the transfer will be made.
                        
                             🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**

                             🔸**Must contain the full account number in IBAN format.**
                           commissionPayer:
                            type: string
                            description: |
                             Specifies the party responsible for paying the commission: 

                             - `Recipient`
                             - `Sender`

                             🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**
                invoice:
                  type: object
                  description: |
                   This object presents the necessary data for customs authorities to process the consignment efficiently, including the assessment of duties and taxes, and to confirm adherence to import/export regulations. The structured format of the invoice ensures that all pertinent information is easily accessible and clear, facilitating a smoother transit across borders.
                   
                   **🔸It encapsulates the invoice details, which are required for international shipments undergoing customs clearance.**
                  properties:
                    customerNumber:
                      type: string
                      description: Unique invoice identifier provided by the client, corresponding to the goods being shipped. It is used for customs clearance as it ensures a clear link between the goods and their supporting documentation, including value, origin, and other necessary information for customs processing. This helps to better track the goods, speed up customs clearance, and reduce the risk of delays.
                      maxLength: 50
                      nullable: true
                    incoterm:
                      type: string
                      description: |
                        Specifies the trade terms for the shipping agreement between the buyer and seller, based on selected standards from the Incoterms® rules. These terms define the allocation of shipping costs, insurance, customs duties, and the distribution of risk. Only a limited subset of Incoterms® is available for use:
                          - DAP (Delivered at Place) - The recipient is responsible for import customs clearance, duties, and taxes.
                          - DDP (Delivered Duty Paid) - The sender is responsible for import customs clearance and for paying all applicable duties and taxes.

                          **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                      enum:
                        - DAP
                        - DDP
                    currencyCode:
                      type: string
                      description: |
                       Specifies the transaction currency according to the ISO-4217 standard. Typically, EUR is used; however, in countries such as the USA, Brazil, and Moldova, USD is utilized.

                       **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                      pattern: "^[A-Z]{3}$"
                    exportReason:
                      type: string
                      description: |
                        Specifies the general reason for exporting items, which is required for customs and other regulatory bodies. This classification helps in understanding the type of shipment without getting into specifics. It's used to categorize shipments at a high level for smoother processing through customs. The available options are:
                          - ForPersonalPurposes: Items are for personal use or gifts.
                          - Selling: Items are meant for sale.
                          - Repair: Items being sent for repair.
                          - Return: Items are being returned to the sender or manufacturer.
                          - Other: Any reason not covered by the other options.

                        **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                      enum:
                        - ForPersonalPurposes
                        - Selling
                        - Repair
                        - Return
                        - Other
                    totalCost:
                      type: number
                      description: |
                       Represents the total declared value of the shipment, as stated by the sender, in the local currency of the sender's country. This value should reflect the complete worth of the shipped items and is important for customs and purposes.

                       **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                      minimum: 1
                      maximum: 9999999.99
                    totalCostEur:
                      type: number
                      description: |
                       This is the total declared value of the shipment converted to Euros (EUR), facilitating easier processing for international shipments within Europe. This value can be calculated through a currency conversion request (Exchange rates) to ensure accuracy.
                      
                       **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                      minimum: 1
                      maximum: 9999999.99
                    totalCostUsd:
                      type: number
                      description: |
                       Similar to the EUR equivalent, this field indicates the total declared value of the shipment in United States Dollars (USD). It's essential for international trade and customs clearance, especially for shipments to or from the USA. The same as the Euro, this value can be determined using a currency conversion request to ensure accuracy.
                       
                       **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                      minimum: 1
                      maximum: 9999999.99
                    payerFeesCustoms:
                      type: string
                      description: |
                        Specifies who is responsible for paying for customs services. The parameter determines which party bears the costs:

                          - Sender: The party sending the goods pays for the customs duties.
                          - Recipient: The party receiving the goods is responsible for the customs duties costs.
                          - ThirdPerson: A third party can only pay for customs services if this is permitted and the payer for delivery services is also a third party.

                        The default value is **"Recipient"**.</br>
                        This value will also be applied automatically if the parcel exceeds the maximum allowed value (in the recipient country’s currency) for which the sender is permitted to pay customs duties.

                        **🔹This parameter is required and valid only for the UA-EU direction.**
                      enum:
                        - Sender
                        - Recipient
                        - ThirdPerson
                    items:
                      type: array
                      description: |
                       A detailed list of goods being shipped, including required descriptions and values, essential for customs declarations and assessing duties.

                       **🔸It is required to provide this information for each individual good in the shipment in the form of an array.**
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            description: |
                             A unique identifier for each item within the shipment.

                             **🔹This field is optional.**
                          packingType:
                            type: string
                            description: |
                              The type of packing used for the shipment. This field should contain a specific code that represents the packaging type. Allowed values include:
                                - PA: Box.
                                - PX: Pallet.
                              This field is referenced when generating the invoice.
                            enum:
                              - PA
                              - PX
                            maxLength: 30
                            nullable: true
                          hsCode:
                            type: string
                            description: |
                              The Harmonized System code for each item, a standardized numerical method of classifying traded products.
                                This field is required for international shipments that pass through customs clearance. You can obtain the valid `hsCode` from the Cargo Classifiers (UKT ZED) dictionary.
                                Validation rules:
                                - **If the sender or recipient country is Moldova (MD) or Canada (CA):**
                                  - The `hsCode` must consist of exactly 10 numeric characters.
                                  - If the input is longer than 10 digits, it will be **truncated** on the right.
                                  - If it contains fewer than 10 digits - validation error.
                                - **For all other countries:**
                                  - The `hsCode` must contain **between 8 and 10 numeric characters** (inclusive).
                                  - If fewer than 8 digits – validation error.
                                - **All non-digit characters will be stripped automatically before validation.** 
                                - **If the value of the `hsCode` field is `210690` or `630900`, the following conditions must be met:**
                                  - The `measurementCode` must be set to `kg`.
                                  - Each item with this `hsCode` must be unique — the invoice must not contain more than one item with code `210690` or `630900`.
                                  - The amount value must not exceed 10.

                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            maxLength: 255
                            nullable: true
                          name:
                            type: string
                            description: |
                              Represents the item's name in the local language, offering an accurate description for customs and logistical planning. The name should correspond with terminologies found in the Cargo Classifiers (UKT ZED) dictionary, ensuring compliance with standard classification codes. This detailed description aids in precise item identification during the customs clearance process.
                              This field supports Unicode encoding, permitting the inclusion of special characters and symbols using the \uXXXX format. This capability allows for precise representation of item names in languages that incorporate non-Latin characters, enhancing clarity and understanding across diverse regulatory environments.
                            
                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            maxLength: 512
                          nameEng:
                            type: string
                            description: |
                              Specifies the item's name in English, critical for ensuring that the product is identifiable and understandable across international trade and logistics channels. The English name simplifies communication and documentation processes when dealing with international partners and authorities, aiding in the seamless facilitation of global shipments.
                              Similar to the 'name' field, this parameter also supports Unicode encoding. Using the \uXXXX format, it accommodates the accurate rendering of any special characters necessary for the correct representation of the item's name in English.
                             
                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            maxLength: 512
                          material:
                            type: string
                            description: |
                             The primary material from which the item is made, important for customs declarations and potential restrictions.

                              **🔸If this field is not provided, the default value will be applied.**
                            maxLength: 50
                          materialEng:
                            type: string
                            description: |
                             The description of the item's material in English, aiding in the universal understanding of the product's composition.

                             **🔸If this field is not provided, the default value will be applied.**
                            maxLength: 255
                          madeInCountryCode:
                            type: string
                            description: |
                             The ISO 3166-1 alpha-2 code indicating the country of manufacture, essential for determining import duties and compliance with trade agreements.

                             **🔸This field is not required; however, shipments with this field filled are given priority during customs clearance.**
                            pattern: "^[A-Z]{2}$"
                            nullable: true
                          producerAndModel:
                            type: string
                            description: |
                              The parameter represents the manufacturer and model of the device when creating a shipment. Both values are included in a single parameter. This parameter is mandatory for the following categories:
                                - Electrical appliances
                                - Laptops
                                - Phones
                                - Large and small household appliances
                                - Other similar items
                             
                              **🔸This field is not required; however, shipments with this field filled are given priority during customs clearance.**
                            maxLength: 255
                            nullable: true
                          actualWeight:
                            type: integer
                            description: |
                             The weight of the item, crucial for calculating shipping costs and ensuring the shipment complies with carrier limitations.
                             Expected unit: grams (g)
                             Only precision up to 10 grams (0.01 kg) is supported. Values not divisible by 10 g will be rounded down to the nearest lower multiple of 10 g.

                             ⚠️IMPORTANT: Please round weight values to the nearest 10 g before sending, to avoid unexpected adjustments.
                            minimum: 1
                            maximum: 2147483647
                            nullable: true
                          measurementCode:
                            type: string
                            description: |
                             The unit of measurement for the item quantity, such as pieces, kilograms, meters, etc., standardizing the way quantities are reported.

                             **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            maxLength: 255
                          amount:
                            type: number
                            description: |
                             The quantity of the item being shipped, necessary for inventory and customs documentation. Value in the units of measurement corresponding to the field "measurementCode".

                             **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            minimum: 0
                            maximum: 9999999.99
                          cost:
                            type: number
                            description: | 
                             The value of the item in the sender's currency, important for insurance and customs valuation.

                             **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            minimum: 0
                            maximum: 9999999.99
                          currency:
                            type: string
                            description: | 
                             This field is used to specify the currency in which the item value was declared for shipments from Ukraine to Europe (UA-EU).

                             ⚠️IMPORTANT:
                              - If the parameter is not provided, 'UAH' is used by default. 
                              - All items in the invoice must be declared in the same currency
                          costUsd:
                            type: number
                            description: |
                             The item's value converted to US Dollars, facilitating consistent valuation in international transactions. This value can be calculated through a currency conversion request (Exchange rates) to ensure accuracy.

                             **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            minimum: 0
                            maximum: 9999999.99
                          costEur:
                            type: number
                            description: |
                             The item's value in Euros, providing a standardized currency evaluation for European trade operations. Similar to the USD value, this can be determined using a currency conversion request to ensure accuracy.

                             **🔹This field is required for shipments crossing the EU border or going outside the EU.**
                            minimum: 0
                            maximum: 9999999.99
                parcels*:
                  type: array
                  description: |
                   Parcels` description block. Array contains objects, each object responsible for information about parcel.

                   **🔻All fields in this array must be filled.**
                  items:
                    type: object
                    properties:
                      cargoCategory*:
                        type: string
                        description: |
                          Specifies the type of the shipment, helping to categorize the goods for logistics and customs processing. The category impacts how the shipment is handled, its shipping cost, and the required documentation. Available categories are:
                            - parcel: Small to medium-sized packages, typically for consumer goods and retail items.
                            - documents: Postal shipments containing documents such as letters, contracts, and official papers. This category is specifically for items that weigh no more than 1 kg and have dimensions not exceeding 35 cm in length, 25 cm in width, and 2 cm in height.
                        enum:
                          - parcel
                          - documents
                      parcelDescription*:
                        type: string
                        description: |
                          This field requires a concise description of the contents within the shipment, providing essential information on the nature of the items enclosed. This description aids in the logistics process, offering a clear understanding of the package contents for transportation planning and customs clearance. The summary should include details like the type of items, their purpose, and any other relevant information that describes the contents. It’s crucial for ensuring that the shipment complies with shipping regulations and facilitates smooth customs processing.
                          Additionally, this field supports data in Unicode encoding, allowing for the inclusion of special characters and symbols using the \uXXXX format. This feature is particularly useful for languages that use non-Latin characters, ensuring accurate representation of item descriptions across diverse linguistic contexts.
                        maxLength: 255
                      insuranceCost*:
                        type: number
                        format: float
                        description: |
                          Represents the declared value of the shipment for insurance coverage, in the currency of the sender's country. This value indicates the maximum compensation amount in the event of damage or loss during transit. Setting this value appropriately is crucial for ensuring adequate insurance protection. It is important to accurately declare this value to match the actual worth of the shipment contents, as underdeclaring can result in insufficient compensation.

                          The minimum allowable value depends on the shipment direction:
                            - **UA → EU / UA → International:** the value must be greater than 0 due to mandatory invoice and insurance requirements.
                            - **EU → EU:** a value of 0 is permitted for shipments that do not require insurance coverage.
                        minimum: 1
                        exclusiveMinimum: true
                        example: 1.50 # Example value
                      rowNumber*:
                        type: integer
                        description: |
                         Sequential identifier for each parcel within a shipment, used to organize and track individual packages, especially when multiple items are involved. If the shipment contains only one package, the value should be 1.
                        minimum: 1
                      width*:
                        type: integer
                        description: |
                         The parcel's width measured in millimeters, used alongside length and height to compute the total volume for logistical planning.
                        minimum: 1
                      length*:
                        type: integer
                        description: |
                         The parcel's length measured in millimeters, used alongside height and width to compute the total volume for logistical planning.
                        minimum: 1
                      height*:
                        type: integer
                        description: |
