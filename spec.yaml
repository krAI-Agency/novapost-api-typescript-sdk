      description: |
        This API method allows you to retrieve a transportation document marking in PDF format by providing the document number. The document marking is a printable document that clients can attach or affix to their cargo when sending it. By specifying the document number in the request, you can generate a PDF file containing the document marking for easy
        printing.

        🔹**Description of control elements:**

        **SCHEMA**</br>
        Displays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.
        - **Single line description**</br>
          A description that fits into a single line; any text that does not fit remains hidden.
        - **Multiline description**</br>
          An expanded description that displays more than one line of text.

        **EXAMPLE**</br>
        Shows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.
      parameters:
        - in: query
          name: 'numbers[]'
          description: Shipment numbers. Can accept either a single number or an array of numbers. When `type=marking` is used, only one number is allowed per request.
          schema:
            type: string
            example: SHPL1234567890
        - in: query
          name: type
          description: |
            Type of document to be printed.
            - `marking`: for shipment label 100x100 (local or international)
            - `international`: for customs declaration/invoice
            - `invoice`: for commercial invoice
          schema:
            type: array
