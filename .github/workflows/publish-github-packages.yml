name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag (for example latest, beta, next)"
        required: false
        default: latest

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-github-packages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute npm scope
        id: meta
        shell: bash
        run: |
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lower=${owner_lower}" >> "${GITHUB_OUTPUT}"
          echo "Publishing as @${owner_lower}/novapost-api-sdk"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@${{ steps.meta.outputs.owner_lower }}"

      - name: Install dependencies
        run: npm ci

      - name: Align package name with GitHub Packages scope
        shell: bash
        run: |
          npm pkg set "name=@${{ steps.meta.outputs.owner_lower }}/novapost-api-sdk"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          dist_tag="latest"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            dist_tag="${{ github.event.inputs.dist_tag }}"
          fi
          npm publish --access public --provenance --tag "${dist_tag}"
